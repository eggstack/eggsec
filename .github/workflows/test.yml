name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.80.0
        with:
          profile: minimal
          toolchain: 1.80.0
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      
      - name: Run tests
        run: cargo test -p slapper --features rest-api,nse
        
      - name: Run clippy
        run: cargo clippy -p slapper --features rest-api,nse -- -D warnings
        
      - name: Check formatting
        run: cargo fmt --check

  test-features:
    name: Test (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "rest-api"
          - "stress-testing"
          - "packet-inspection"
          - "nse"
          - "full"
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.80.0
        with:
          profile: minimal
          toolchain: 1.80.0
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      
      - name: Build with features
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo build -p slapper
          else
            cargo build -p slapper --features ${{ matrix.features }}
          fi
      
      - name: Run clippy with features
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo clippy -p slapper -- -D warnings
          else
            cargo clippy -p slapper --features ${{ matrix.features }} -- -D warnings
          fi
      
      - name: Run tests with features
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo test -p slapper
          else
            cargo test -p slapper --features ${{ matrix.features }}
          fi

  check-plugins:
    name: Check Plugin Features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.80.0
        with:
          profile: minimal
          toolchain: 1.80.0
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      
      - name: Check python-plugins
        run: cargo check -p slapper --features python-plugins
      
      - name: Check ruby-plugins
        run: cargo check -p slapper --features ruby-plugins
      
      - name: Check all-plugins
        run: cargo check -p slapper --features all-plugins

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.80.0
        with:
          profile: minimal
          toolchain: 1.80.0
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      
      - name: Run coverage
        run: cargo tarpaulin -p slapper --features rest-api,nse --out xml --output-dir coverage --skip-clean
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
        continue-on-error: true

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.80.0
        with:
          profile: minimal
          toolchain: 1.80.0
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      
      - name: Build
        run: cargo build -p slapper --release

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.80.0
        with:
          profile: minimal
          toolchain: 1.80.0
      
      - name: Install cargo-audit
        run: cargo install cargo-audit
      
      - name: Run security audit
        run: cargo audit --deny warnings
        continue-on-error: true

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cargo-deny
        run: cargo install cargo-deny
      
      - name: Check advisories
        run: cargo deny check advisories
      
      - name: Check licenses
        run: cargo deny check licenses
      
      - name: Check bans
        run: cargo deny check bans
