name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --lib -p slapper -- -D warnings

  check:
    name: Check (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            args: ""
          - name: minimal-cli
            args: "-p slapper"
          - name: rest-api
            args: "-p slapper --features rest-api"
          - name: grpc-api
            args: "-p slapper --features grpc-api"
          - name: packet-inspection
            args: "-p slapper --features packet-inspection"
          - name: stress-testing
            args: "-p slapper --features stress-testing"
          - name: nse
            args: "-p slapper --features nse"
          - name: nse-sandbox
            args: "-p slapper --features nse,nse-sandbox"
          - name: api-schema
            args: "-p slapper --features api-schema"
          - name: sbom
            args: "-p slapper --features sbom"
          - name: full
            args: "-p slapper --features full"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: check-${{ matrix.name }}
      - name: cargo check
        run: cargo check ${{ matrix.args }}

  test-features:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: lib-default
            args: "--lib -p slapper"
          - name: lib-rest-api
            args: "--lib -p slapper --features rest-api"
          - name: lib-api-schema
            args: "--lib -p slapper --features api-schema"
          - name: lib-sbom
            args: "--lib -p slapper --features sbom"
          - name: feature-surface
            args: "--test feature_surface -p slapper"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.name }}
      - name: cargo test
        run: cargo test ${{ matrix.args }}

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          profile: minimal
          toolchain: stable
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      
      - name: Run coverage
        run: cargo tarpaulin -p slapper --features rest-api,nse --out xml --output-dir coverage --skip-clean
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
        continue-on-error: true

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          profile: minimal
          toolchain: stable
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      
      - name: Build
        run: cargo build -p slapper --release

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          profile: minimal
          toolchain: stable
      
      - name: Install cargo-audit
        run: cargo install cargo-audit
      
      # Fail on vulnerabilities for public release - no silent failures
      - name: Run security audit
        run: cargo audit --deny warnings

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cargo-deny
        run: cargo install cargo-deny
      
      - name: Check advisories
        run: cargo deny check advisories
      
      - name: Check licenses
        run: cargo deny check licenses
      
      - name: Check bans
        run: cargo deny check bans

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
          allow-licenses: MIT, Apache-2.0, BSD-3-Clause, CC0-1.0

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
