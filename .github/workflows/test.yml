name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --lib -p eggsec -- -D warnings

  check:
    name: Check (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            args: ""
          - name: minimal-cli
            args: "-p eggsec"
          - name: rest-api
            args: "-p eggsec --features rest-api"
          - name: grpc-api
            args: "-p eggsec --features grpc-api"
          - name: packet-inspection
            args: "-p eggsec --features packet-inspection"
          - name: stress-testing
            args: "-p eggsec --features stress-testing"
          - name: nse
            args: "-p eggsec --features nse"
          - name: nse-sandbox
            args: "-p eggsec --features nse,nse-sandbox"
          - name: api-schema
            args: "-p eggsec --features api-schema"
          - name: sbom
            args: "-p eggsec --features sbom"

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: check-${{ matrix.name }}
      - name: cargo check
        run: cargo check ${{ matrix.args }}

  test-features:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: lib-default
            args: "--lib -p eggsec"
          - name: lib-rest-api
            args: "--lib -p eggsec --features rest-api"
          - name: lib-api-schema
            args: "--lib -p eggsec --features api-schema"
          - name: lib-sbom
            args: "--lib -p eggsec --features sbom"
          - name: feature-surface
            args: "--test feature_surface -p eggsec"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.name }}
      - name: cargo test
        run: cargo test ${{ matrix.args }}

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          profile: minimal
          toolchain: stable
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      
      - name: Run coverage
        run: cargo tarpaulin -p eggsec --features rest-api,nse --out xml --output-dir coverage --skip-clean
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
        continue-on-error: true

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          profile: minimal
          toolchain: stable
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      
      - name: Build
        run: cargo build -p eggsec --release

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          profile: minimal
          toolchain: stable
      
      - name: Install cargo-audit
        run: cargo install cargo-audit
      
      # Fail on vulnerabilities for public release - no silent failures
      - name: Run security audit
        run: cargo audit --deny warnings

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cargo-deny
        run: cargo install cargo-deny
      
      - name: Check advisories
        run: cargo deny check advisories
      
      - name: Check licenses
        run: cargo deny check licenses
      
      - name: Check bans
        run: cargo deny check bans

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
          allow-licenses: MIT, Apache-2.0, BSD-3-Clause, CC0-1.0

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  architecture-guards:
    name: Architecture Guards
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Workspace no-default check
        run: cargo check --workspace --no-default-features
      - name: Lib tests
        run: cargo test -p eggsec --lib
      - name: Metadata consistency
        run: cargo test -p eggsec --test metadata_consistency
      - name: Command registry
        run: cargo test -p eggsec --test command_registry
      - name: Tool registration
        run: cargo test -p eggsec --test tool_registration --features rest-api
      - name: Feature matrix
        run: cargo test -p eggsec --test feature_matrix
      - name: Enforcement matrix
        run: cargo test -p eggsec --test enforcement_matrix
      - name: Enforced dispatch regression
        run: cargo test -p eggsec --test enforced_dispatch_regression
      - name: Report envelope
        run: cargo test -p eggsec-output --test report_envelope
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Architecture guards script
        run: bash scripts/check-architecture-guards.sh

  feature-profiles:
    name: Feature Profile (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - "tool-api,rest-api"
          - "grpc-api"
          - "db-pentest"
          - "db-pentest-mcp,tool-api,rest-api"
          - "mobile"
          - "mobile-dynamic"
          - "web-proxy"
          - "web-proxy-mcp,tool-api,rest-api"
          - "c2-mcp,tool-api,rest-api"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: feature-profile-${{ matrix.features }}
      - name: cargo check
        run: cargo check -p eggsec --features ${{ matrix.features }}

  python-tests:
    name: Python Tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default-wheel
            features: ""
          - name: nse
            features: "nse"
          - name: db-pentest
            features: "db-pentest"
          - name: web-proxy
            features: "web-proxy"
          - name: mobile
            features: "mobile"
          - name: headless-browser
            features: "headless-browser"
          - name: daemon-client
            features: "daemon-client"
          - name: packet-inspection
            features: "packet-inspection"
          - name: stress-testing
            features: "stress-testing"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: python-${{ matrix.name }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install maturin
        run: pip install maturin pytest pytest-timeout
      - name: Build wheel
        working-directory: crates/eggsec-python
        run: |
          if [ -n "${{ matrix.features }}" ]; then
            maturin develop --features "${{ matrix.features }}"
          else
            maturin develop
          fi
      - name: Run tests
        working-directory: crates/eggsec-python
        run: pytest tests/ -v -q --tb=short --timeout=60 --junitxml=test-results-${{ matrix.name }}.xml
        env:
          EGGSEC_ALLOW_LOOPBACK_FIXTURE: "1"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results-${{ matrix.name }}
          path: crates/eggsec-python/test-results-${{ matrix.name }}.xml
          retention-days: 30
      - name: Run validation scripts
        if: matrix.name == 'default-wheel'
        run: |
          bash scripts/check-architecture-guards.sh

  python-capability-matrix:
    name: Python capability matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build default wheel
        working-directory: crates/eggsec-python
        run: pip install maturin && maturin develop
      - name: Check capability matrix
        run: python scripts/check-python-capability-matrix.py

  python-architecture-guards:
    name: Python architecture guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build default wheel
        working-directory: crates/eggsec-python
        run: pip install maturin && maturin develop
      - name: Check architecture guards
        run: python scripts/check-python-architecture-guards.py

  python-stub-parity:
    name: Python stub parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build default wheel
        working-directory: crates/eggsec-python
        run: pip install maturin && maturin develop
      - name: Check stub parity
        run: python scripts/check_python_stub_parity.py

  python-type-check:
    name: Python type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build default wheel
        working-directory: crates/eggsec-python
        run: pip install maturin && maturin develop
      - name: Install type checkers
        run: pip install mypy pyright
      - name: Run type checks
        run: bash scripts/check_python_types.sh

  python-maturity-consistency:
    name: Python maturity consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build default wheel
        working-directory: crates/eggsec-python
        run: pip install maturin && maturin develop
      - name: Check maturity consistency
        run: python scripts/check-python-capability-matrix.py --check-maturity

  python-feature-metadata:
    name: Python feature metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build default wheel
        working-directory: crates/eggsec-python
        run: pip install maturin && maturin develop
      - name: Check feature metadata
        run: python scripts/check-python-architecture-guards.py --check-feature-metadata

  python-profile-manifest:
    name: Python profile manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate profile manifest
        run: python scripts/validate_python_profiles.py --manifest crates/eggsec-python/validation/profiles.json

  python-evidence-bundle:
    name: Python evidence bundle
    runs-on: ubuntu-latest
    needs: [python-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build default wheel
        working-directory: crates/eggsec-python
        run: pip install maturin && maturin develop
      - name: Generate evidence bundle
        run: python scripts/build_python_release_evidence.py --commit "${{ github.sha }}"
      - name: Upload evidence bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-evidence-bundle
          path: target/python-validation/
          retention-days: 90

  python-maturity-guard:
    name: Python maturity guard
    runs-on: ubuntu-latest
    needs: [python-evidence-bundle]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build default wheel
        working-directory: crates/eggsec-python
        run: pip install maturin && maturin develop
      - name: Generate evidence bundle
        run: python scripts/build_python_release_evidence.py --commit "${{ github.sha }}"
      - name: Run maturity guard
        run: python scripts/check_maturity_guard.py

  python-skip-budget:
    name: Python skip budget
    runs-on: ubuntu-latest
    needs: [python-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build default wheel
        working-directory: crates/eggsec-python
        run: pip install maturin && maturin develop
      - name: Download default-wheel test results
        uses: actions/download-artifact@v4
        with:
          name: python-test-results-default-wheel
          path: /tmp/test-results/
      - name: Enforce skip budgets
        run: |
          if [ -f /tmp/test-results/test-results-default-wheel.xml ]; then
            python scripts/python_skip_budget.py \
              --profile default-wheel \
              --manifest crates/eggsec-python/validation/profiles.json \
              --junit-xml /tmp/test-results/test-results-default-wheel.xml
          else
            echo "No JUnit XML found, skipping budget enforcement"
          fi

  python-release-gate:
    name: Python release gate
    if: always()
    needs: [
      python-capability-matrix,
      python-architecture-guards,
      python-stub-parity,
      python-type-check,
      python-maturity-consistency,
      python-feature-metadata,
      python-profile-manifest,
      python-evidence-bundle,
      python-maturity-guard,
      python-skip-budget,
    ]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate gate
        run: |
          echo "Python release gate evaluation:"
          echo "  python-capability-matrix: ${{ needs.python-capability-matrix.result }}"
          echo "  python-architecture-guards: ${{ needs.python-architecture-guards.result }}"
          echo "  python-stub-parity: ${{ needs.python-stub-parity.result }}"
          echo "  python-type-check: ${{ needs.python-type-check.result }}"
          echo "  python-maturity-consistency: ${{ needs.python-maturity-consistency.result }}"
          echo "  python-feature-metadata: ${{ needs.python-feature-metadata.result }}"
          echo "  python-profile-manifest: ${{ needs.python-profile-manifest.result }}"
          echo "  python-evidence-bundle: ${{ needs.python-evidence-bundle.result }}"
          echo "  python-maturity-guard: ${{ needs.python-maturity-guard.result }}"
          echo "  python-skip-budget: ${{ needs.python-skip-budget.result }}"

          FAILED=0
          for result in \
            "${{ needs.python-capability-matrix.result }}" \
            "${{ needs.python-architecture-guards.result }}" \
            "${{ needs.python-stub-parity.result }}" \
            "${{ needs.python-type-check.result }}" \
            "${{ needs.python-maturity-consistency.result }}" \
            "${{ needs.python-feature-metadata.result }}" \
            "${{ needs.python-profile-manifest.result }}" \
            "${{ needs.python-evidence-bundle.result }}" \
            "${{ needs.python-maturity-guard.result }}" \
            "${{ needs.python-skip-budget.result }}"; do
            if [ "$result" != "success" ]; then
              echo "FAILED: required job result was '$result' (expected 'success')"
              FAILED=1
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo "::error::Python release gate failed: one or more required guards did not succeed"
            exit 1
          fi

          echo "All required Python guards passed."

  release-gate:
    name: Release gate
    if: always()
    needs: [
      fmt,
      clippy,
      check,
      test-features,
      security-audit,
      architecture-guards,
      feature-profiles,
      python-release-gate,
    ]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate release gate
        run: |
          echo "Release gate evaluation:"
          echo "  fmt: ${{ needs.fmt.result }}"
          echo "  clippy: ${{ needs.clippy.result }}"
          echo "  check: ${{ needs.check.result }}"
          echo "  test-features: ${{ needs.test-features.result }}"
          echo "  security-audit: ${{ needs.security-audit.result }}"
          echo "  architecture-guards: ${{ needs.architecture-guards.result }}"
          echo "  feature-profiles: ${{ needs.feature-profiles.result }}"
          echo "  python-release-gate: ${{ needs.python-release-gate.result }}"

          FAILED=0
          for result in \
            "${{ needs.fmt.result }}" \
            "${{ needs.clippy.result }}" \
            "${{ needs.check.result }}" \
            "${{ needs.test-features.result }}" \
            "${{ needs.security-audit.result }}" \
            "${{ needs.architecture-guards.result }}" \
            "${{ needs.feature-profiles.result }}" \
            "${{ needs.python-release-gate.result }}"; do
            if [ "$result" != "success" ]; then
              echo "FAILED: required job result was '$result' (expected 'success')"
              FAILED=1
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo "::error::Release gate failed: one or more required jobs did not succeed"
            exit 1
          fi

          echo "All required release gates passed."
