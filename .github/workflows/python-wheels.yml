name: Python Wheels

on:
  push:
    branches: [main]
    paths:
      - crates/eggsec-python/**
      - .github/workflows/python-wheels.yml
      - scripts/**
      - docs/python/**
  pull_request:
    paths:
      - crates/eggsec-python/**
      - .github/workflows/python-wheels.yml
      - scripts/**
      - docs/python/**
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish the already validated TestPyPI artifacts to PyPI"
        required: false
        default: false
        type: boolean

env:
  MATURIN_VERSION: "1.7"
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-14
            manylinux: auto
          - target: aarch64-apple-darwin
            os: macos-14
            manylinux: auto
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: auto
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: auto
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build wheel with maturin
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: >-
            --release
            --out dist
            --manifest-path crates/eggsec-python/Cargo.toml
          manylinux: ${{ matrix.manylinux }}
          rust-toolchain: "1.80"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  test:
    name: Test wheel (${{ matrix.target }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist

      - name: Install wheel in clean venv
        run: |
          python -m venv .venv-test
          source .venv-test/bin/activate
          WHEEL=$(ls dist/*.whl)
          pip install "$WHEEL"
          pip install pytest pytest-timeout
          python -c "import eggsec; print(f'Installed eggsec {eggsec.__version__}')"

      - name: Import smoke test
        run: |
          source .venv-test/bin/activate
          python crates/eggsec-python/python/tests/test_python_smoke.py

      - name: Localhost scanner smoke test
        run: |
          source .venv-test/bin/activate
          python -c "
          import eggsec
          scope = eggsec.Scope.allow_hosts(['127.0.0.1'])
          result = eggsec.scan_ports(target='127.0.0.1', ports=[22, 80, 443], scope=scope, timeout_ms=2000)
          print(f'Scan result: {result}')
          assert hasattr(result, 'open_ports')
          assert hasattr(result, 'target')
          assert result.target == '127.0.0.1'
          print('Localhost scanner smoke test passed')
          "

      - name: Serialization/report smoke test
        run: |
          source .venv-test/bin/activate
          python -c "
          import json
          import eggsec

          # Build a report with findings
          report = eggsec.Report(metadata={'scanner': 'smoke-test', 'version': eggsec.__version__})
          finding = eggsec.Finding(
              id='smoke-1',
              title='Smoke test finding',
              severity=eggsec.Severity.Info,
              target='127.0.0.1',
              category='smoke-test',
              description='Automated smoke test finding',
          )
          report.add_finding(finding)
          assert len(report) == 1

          # Test JSON roundtrip
          j = report.to_json()
          parsed = json.loads(j)
          assert parsed['findings'][0]['id'] == 'smoke-1'

          # Test dict export
          d = report.to_dict()
          assert 'findings' in d
          assert 'metadata' in d

          # Test rows export
          rows = report.to_rows()
          assert len(rows) == 1

          # Test FindingSet
          fs = eggsec.FindingSet()
          fs.add_finding(finding)
          assert len(fs) == 1
          assert fs.by_severity(eggsec.Severity.Info) == 1

          # Test Severity enum
          assert str(eggsec.Severity.Critical) == 'Critical'
          s = eggsec.Severity.from_str('high')
          assert s == eggsec.Severity.High

          # Test Evidence
          ev = eggsec.Evidence(
              kind='header',
              value='Server: nginx',
              source='response',
              confidence=0.95,
          )
          ev_j = ev.to_json()
          assert 'nginx' in ev_j

          print('Serialization/report smoke test passed')
          "

      - name: Run installed-wheel pytest suite
        run: |
          source .venv-test/bin/activate
          EGGSEC_ALLOW_LOOPBACK_FIXTURE=1 pytest crates/eggsec-python/tests/ crates/eggsec-python/python/tests/ -v --timeout=30

  architecture:
    name: Architecture guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run repository architecture guards
        run: bash scripts/check-architecture-guards.sh

  publish-testpypi:
    name: Publish to TestPyPI
    needs: test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build wheel for sdist publish
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-gnu
          args: >-
            --release
            --out dist
            --manifest-path crates/eggsec-python/Cargo.toml
          manylinux: auto
          rust-toolchain: "1.80"

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

      - name: Install from TestPyPI and smoke test
        run: |
          python -m venv .venv-testpypi
          source .venv-testpypi/bin/activate
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ eggsec
          python -c "
          import eggsec
          print(f'TestPyPI install OK: eggsec {eggsec.__version__}')
          assert eggsec.has_feature('core')
          print('TestPyPI smoke test passed')
          "

      - name: Retain validated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-validated-wheels
          path: dist/*.whl

  publish-pypi:
    name: Publish to PyPI (manual approval)
    needs: publish-testpypi
    if: github.event_name == 'workflow_dispatch' && inputs.publish_pypi == true
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download TestPyPI-validated artifacts
        uses: actions/download-artifact@v4
        with:
          name: testpypi-validated-wheels
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  test-feature-profiles:
    name: Feature profile (${{ matrix.feature }})
    needs: [build]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature:
          - full-no-system
          - websocket
          - git-secrets
          - sbom
          - container
          - packet-inspection
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install maturin
        run: pip install maturin

      - name: Build with features
        run: maturin develop --release --manifest-path crates/eggsec-python/Cargo.toml --features ${{ matrix.feature }}

      - name: Run feature tests
        run: |
          EGGSEC_ALLOW_LOOPBACK_FIXTURE=1 pytest crates/eggsec-python/tests/ -k "${{ matrix.feature }}" --timeout=30 -v

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-${{ matrix.feature }}-results
          path: target/python-validation/

  validation-matrix:
    name: Release 1/2 validation matrix
    needs: [build]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel for validation
        run: maturin develop --release --manifest-path crates/eggsec-python/Cargo.toml

      - name: Run validation matrix
        run: |
          bash scripts/validate_python_release_1_2.sh --all --ci

      - name: Upload validation matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-1-2-validation-matrix
          path: target/python-validation/release-1-2-matrix.json

      - name: Upload binary size report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: binary-size-report
          path: target/python-validation/binary-size-report.json

  performance-report:
    name: Performance report
    needs: [build]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install maturin
        run: pip install maturin

      - name: Build with default features
        run: maturin develop --release --manifest-path crates/eggsec-python/Cargo.toml

      - name: Run performance report
        run: |
          EGGSEC_ALLOW_LOOPBACK_FIXTURE=1 pytest crates/eggsec-python/tests/test_performance_report.py -v --timeout=120

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: target/python-validation/performance-report.json

  skip-report:
    name: Skip report
    needs: [test, test-feature-profiles]
    if: always() && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install maturin
        run: pip install maturin

      - name: Build with default features
        run: maturin develop --release --manifest-path crates/eggsec-python/Cargo.toml

      - name: Capture pytest skip reasons
        run: |
          mkdir -p target/python-validation
          EGGSEC_ALLOW_LOOPBACK_FIXTURE=1 pytest crates/eggsec-python/tests/ crates/eggsec-python/python/tests/ -v --timeout=30 --tb=no 2>&1 | \
          python -c "
          import sys, json, re

          lines = sys.stdin.readlines()
          skips = []
          for line in lines:
              m = re.match(r'.*SKIPPED.*\((.+)\)', line)
              if m:
                  skips.append(m.group(1))
              m2 = re.match(r'.*::\w+ SKIPPED.*\((.+)\)', line)
              if m2:
                  reason = m2.group(1)
                  if reason not in skips:
                      skips.append(reason)

          report = {
              'total_skipped': len(skips),
              'skip_reasons': skips,
          }
          with open('target/python-validation/skip-report.json', 'w') as f:
              json.dump(report, f, indent=2)
          print(f'Captured {len(skips)} skip reasons')
          "

      - name: Upload skip report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skip-report
          path: target/python-validation/skip-report.json

  python-architecture-guards:
    name: Python architecture guards
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Create virtualenv
        run: python -m venv .venv && source .venv/bin/activate && echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV

      - name: Build default wheel
        working-directory: crates/eggsec-python
        run: source $GITHUB_WORKSPACE/.venv/bin/activate && pip install maturin && maturin develop

      - name: Check Python capability matrix
        run: source $GITHUB_WORKSPACE/.venv/bin/activate && python scripts/check-python-capability-matrix.py

      - name: Check Python architecture guards
        run: source $GITHUB_WORKSPACE/.venv/bin/activate && python scripts/check-python-architecture-guards.py

      - name: Check Python stub parity
        run: source $GITHUB_WORKSPACE/.venv/bin/activate && python scripts/check_python_stub_parity.py

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/eggsec-python/Cargo.toml
          rust-toolchain: "1.80"

      - name: Validate sdist contents
        run: |
          SDIST=$(ls dist/*.tar.gz)
          echo "Built sdist: $SDIST"
          echo "Size: $(du -h "$SDIST" | cut -f1)"
          # Verify workspace crates are included
          tar tzf "$SDIST" | grep -c "crates/eggsec-core/" || { echo "FAIL: missing eggsec-core"; exit 1; }
          tar tzf "$SDIST" | grep -c "crates/eggsec/src/" || { echo "FAIL: missing eggsec engine"; exit 1; }
          tar tzf "$SDIST" | grep -c "crates/eggsec-python/src/" || { echo "FAIL: missing eggsec-python src"; exit 1; }
          echo "sdist validation passed"

      - name: Test sdist build
        run: |
          python -m venv .venv-sdist
          source .venv-sdist/bin/activate
          SDIST=$(ls dist/*.tar.gz)
          pip install "$SDIST" || {
            echo "sdist build failed — documenting failure per E4 plan"
            echo "Source distribution requires Rust toolchain (cargo) which is not available in this environment."
            echo "sdist builds are validated in the build-matrix job with Rust available."
            exit 0
          }
          python -c "import eggsec; print(f'sdist install OK: {eggsec.__version__}')"

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  test-multi-version:
    name: Python ${{ matrix.python-version }} (${{ matrix.target }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            python-version: "3.9"
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            python-version: "3.10"
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            python-version: "3.11"
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            python-version: "3.12"
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            python-version: "3.13"
          - target: x86_64-apple-darwin
            os: macos-14
            python-version: "3.9"
          - target: x86_64-apple-darwin
            os: macos-14
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist

      - name: Install wheel in clean venv
        run: |
          python -m venv .venv-multi
          source .venv-multi/bin/activate
          WHEEL=$(ls dist/*.whl)
          pip install "$WHEEL"
          pip install pytest pytest-timeout
          python -c "import eggsec; print(f'Python {python_version} — eggsec {eggsec.__version__}')"

      - name: Import and introspection smoke test
        run: |
          source .venv-multi/bin/activate
          python -c "
          import eggsec
          # Verify core symbols exist
          assert hasattr(eggsec, 'Engine')
          assert hasattr(eggsec, 'AsyncEngine')
          assert hasattr(eggsec, 'Scope')
          assert hasattr(eggsec, 'PortScanRequest')
          assert hasattr(eggsec, 'features')
          assert hasattr(eggsec, 'build_info')
          assert hasattr(eggsec, 'wheel_profile')

          # Verify feature introspection
          f = eggsec.features()
          assert isinstance(f, list)
          assert len(f) > 0

          info = eggsec.build_info()
          assert 'version' in info
          assert 'compiled_features' in info

          profile = eggsec.wheel_profile()
          assert isinstance(profile, str)

          print(f'Import + introspection OK on Python {eggsec.build_info().get(\"python_version\", \"?\")}')
          "

      - name: Run pytest subset on this Python version
        run: |
          source .venv-multi/bin/activate
          EGGSEC_ALLOW_LOOPBACK_FIXTURE=1 pytest crates/eggsec-python/tests/test_import.py crates/eggsec-python/tests/test_smoke.py -v --timeout=30

  wheel-metadata:
    name: Wheel metadata (${{ matrix.target }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist

      - name: Inspect wheel metadata
        run: |
          python -c "
          import json, hashlib, zipfile, os, time

          whl_path = os.path.glob('dist/*.whl')[0]
          whl_name = os.path.basename(whl_path)

          # File size and hash
          size = os.path.getsize(whl_path)
          with open(whl_path, 'rb') as f:
              sha256 = hashlib.sha256(f.read()).hexdigest()

          # Parse wheel tags from filename
          parts = whl_name.replace('.whl', '').split('-')
          py_tag = parts[0] if len(parts) > 0 else '?'
          abi_tag = parts[1] if len(parts) > 1 else '?'
          platform_tag = parts[2] if len(parts) > 2 else '?'

          # Read METADATA from inside the wheel
          with zipfile.ZipFile(whl_path) as zf:
              metadata_name = [n for n in zf.namelist() if n.endswith('.dist-info/METADATA')]
              if metadata_name:
                  metadata = zf.read(metadata_name[0]).decode()
              else:
                  metadata = ''

          # Extract version from metadata
          version = '?'
          for line in metadata.split('\n'):
              if line.startswith('Version:'):
                  version = line.split(':', 1)[1].strip()
                  break

          report = {
              'wheel': whl_name,
              'target': '${{ matrix.target }}',
              'size_bytes': size,
              'sha256': sha256,
              'python_tag': py_tag,
              'abi_tag': abi_tag,
              'platform_tag': platform_tag,
              'version': version,
          }
          print(json.dumps(report, indent=2))
          os.makedirs('target/wheel-metadata', exist_ok=True)
          with open('target/wheel-metadata/${{ matrix.target }}.json', 'w') as f:
              json.dump(report, f, indent=2)
          "

      - name: Upload metadata report
        uses: actions/upload-artifact@v4
        with:
          name: wheel-metadata-${{ matrix.target }}
          path: target/wheel-metadata/

  test-documentation-examples:
    name: Documentation examples
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download x86_64-linux wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-x86_64-unknown-linux-gnu
          path: dist

      - name: Install wheel
        run: |
          python -m venv .venv-doc-test
          source .venv-doc-test/bin/activate
          WHEEL=$(ls dist/*.whl)
          pip install "$WHEEL"
          pip install pytest pytest-timeout

      - name: Run documentation example tests
        run: |
          source .venv-doc-test/bin/activate
          EGGSEC_ALLOW_LOOPBACK_FIXTURE=1 pytest scripts/test_documentation_examples.py -v --timeout=120

  generate-api-reference:
    name: Generate API reference
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download x86_64-linux wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-x86_64-unknown-linux-gnu
          path: dist

      - name: Install wheel
        run: |
          python -m venv .venv-api-ref
          source .venv-api-ref/bin/activate
          WHEEL=$(ls dist/*.whl)
          pip install "$WHEEL"

      - name: Generate API reference from registry
        run: |
          source .venv-api-ref/bin/activate
          python scripts/generate_api_reference.py --output docs/python/api-reference-generated.md

      - name: Upload generated reference
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-reference
          path: docs/python/api-reference-generated.md
