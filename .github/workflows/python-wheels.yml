name: Python Wheels

on:
  push:
    branches: [main]
    paths:
      - crates/eggsec-python/**
      - .github/workflows/python-wheels.yml
      - scripts/**
      - docs/python/**
  pull_request:
    paths:
      - crates/eggsec-python/**
      - .github/workflows/python-wheels.yml
      - scripts/**
      - docs/python/**
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish the already validated TestPyPI artifacts to PyPI"
        required: false
        default: false
        type: boolean

env:
  MATURIN_VERSION: "1.7"
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: Build wheel (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-14
            manylinux: auto
          - target: aarch64-apple-darwin
            os: macos-14
            manylinux: auto
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: auto
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: auto
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build wheel with maturin
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: >-
            --release
            --out dist
            --manifest-path crates/eggsec-python/Cargo.toml
          manylinux: ${{ matrix.manylinux }}
          rust-toolchain: "1.80"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl

  test:
    name: Test wheel (${{ matrix.target }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist

      - name: Install wheel in clean venv
        run: |
          python -m venv .venv-test
          source .venv-test/bin/activate
          WHEEL=$(ls dist/*.whl)
          pip install "$WHEEL"
          pip install pytest pytest-timeout
          python -c "import eggsec; print(f'Installed eggsec {eggsec.__version__}')"

      - name: Import smoke test
        run: |
          source .venv-test/bin/activate
          python crates/eggsec-python/python/tests/test_python_smoke.py

      - name: Localhost scanner smoke test
        run: |
          source .venv-test/bin/activate
          python -c "
          import eggsec
          scope = eggsec.Scope.allow_hosts(['127.0.0.1'])
          result = eggsec.scan_ports(target='127.0.0.1', ports=[22, 80, 443], scope=scope, timeout_ms=2000)
          print(f'Scan result: {result}')
          assert hasattr(result, 'open_ports')
          assert hasattr(result, 'target')
          assert result.target == '127.0.0.1'
          print('Localhost scanner smoke test passed')
          "

      - name: Serialization/report smoke test
        run: |
          source .venv-test/bin/activate
          python -c "
          import json
          import eggsec

          # Build a report with findings
          report = eggsec.Report(metadata={'scanner': 'smoke-test', 'version': eggsec.__version__})
          finding = eggsec.Finding(
              id='smoke-1',
              title='Smoke test finding',
              severity=eggsec.Severity.Info,
              target='127.0.0.1',
              category='smoke-test',
              description='Automated smoke test finding',
          )
          report.add_finding(finding)
          assert len(report) == 1

          # Test JSON roundtrip
          j = report.to_json()
          parsed = json.loads(j)
          assert parsed['findings'][0]['id'] == 'smoke-1'

          # Test dict export
          d = report.to_dict()
          assert 'findings' in d
          assert 'metadata' in d

          # Test rows export
          rows = report.to_rows()
          assert len(rows) == 1

          # Test FindingSet
          fs = eggsec.FindingSet()
          fs.add_finding(finding)
          assert len(fs) == 1
          assert fs.by_severity(eggsec.Severity.Info) == 1

          # Test Severity enum
          assert str(eggsec.Severity.Critical) == 'Critical'
          s = eggsec.Severity.from_str('high')
          assert s == eggsec.Severity.High

          # Test Evidence
          ev = eggsec.Evidence(
              kind='header',
              value='Server: nginx',
              source='response',
              confidence=0.95,
          )
          ev_j = ev.to_json()
          assert 'nginx' in ev_j

          print('Serialization/report smoke test passed')
          "

      - name: Run installed-wheel pytest suite
        run: |
          source .venv-test/bin/activate
          EGGSEC_ALLOW_LOOPBACK_FIXTURE=1 pytest crates/eggsec-python/tests/ crates/eggsec-python/python/tests/ -v --timeout=30

  architecture:
    name: Architecture guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run repository architecture guards
        run: bash scripts/check-architecture-guards.sh

  publish-testpypi:
    name: Publish to TestPyPI
    needs: test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build wheel for sdist publish
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-gnu
          args: >-
            --release
            --out dist
            --manifest-path crates/eggsec-python/Cargo.toml
          manylinux: auto
          rust-toolchain: "1.80"

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/

      - name: Install from TestPyPI and smoke test
        run: |
          python -m venv .venv-testpypi
          source .venv-testpypi/bin/activate
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ eggsec
          python -c "
          import eggsec
          print(f'TestPyPI install OK: eggsec {eggsec.__version__}')
          assert eggsec.has_feature('core')
          print('TestPyPI smoke test passed')
          "

      - name: Retain validated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: testpypi-validated-wheels
          path: dist/*.whl

  publish-pypi:
    name: Publish to PyPI (manual approval)
    needs: publish-testpypi
    if: github.event_name == 'workflow_dispatch' && inputs.publish_pypi == true
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download TestPyPI-validated artifacts
        uses: actions/download-artifact@v4
        with:
          name: testpypi-validated-wheels
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  test-feature-profiles:
    name: Feature profile (${{ matrix.feature }})
    needs: [build]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature:
          - full-no-system
          - websocket
          - git-secrets
          - sbom
          - container
          - packet-inspection
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install maturin
        run: pip install maturin

      - name: Build with features
        run: maturin develop --release --manifest-path crates/eggsec-python/Cargo.toml --features ${{ matrix.feature }}

      - name: Run feature tests
        run: |
          EGGSEC_ALLOW_LOOPBACK_FIXTURE=1 pytest crates/eggsec-python/tests/ -k "${{ matrix.feature }}" --timeout=30 -v

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-${{ matrix.feature }}-results
          path: target/python-validation/

  validation-matrix:
    name: Release 1/2 validation matrix
    needs: [build]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel for validation
        run: maturin develop --release --manifest-path crates/eggsec-python/Cargo.toml

      - name: Run validation matrix
        run: |
          bash scripts/validate_python_release_1_2.sh --all --ci

      - name: Upload validation matrix
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-1-2-validation-matrix
          path: target/python-validation/release-1-2-matrix.json

      - name: Upload binary size report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: binary-size-report
          path: target/python-validation/binary-size-report.json

  performance-report:
    name: Performance report
    needs: [build]
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install maturin
        run: pip install maturin

      - name: Build with default features
        run: maturin develop --release --manifest-path crates/eggsec-python/Cargo.toml

      - name: Run performance report
        run: |
          EGGSEC_ALLOW_LOOPBACK_FIXTURE=1 pytest crates/eggsec-python/tests/test_performance_report.py -v --timeout=120

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: target/python-validation/performance-report.json

  skip-report:
    name: Skip report
    needs: [test, test-feature-profiles]
    if: always() && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install maturin
        run: pip install maturin

      - name: Build with default features
        run: maturin develop --release --manifest-path crates/eggsec-python/Cargo.toml

      - name: Capture pytest skip reasons
        run: |
          mkdir -p target/python-validation
          EGGSEC_ALLOW_LOOPBACK_FIXTURE=1 pytest crates/eggsec-python/tests/ crates/eggsec-python/python/tests/ -v --timeout=30 --tb=no 2>&1 | \
          python -c "
          import sys, json, re

          lines = sys.stdin.readlines()
          skips = []
          for line in lines:
              m = re.match(r'.*SKIPPED.*\((.+)\)', line)
              if m:
                  skips.append(m.group(1))
              m2 = re.match(r'.*::\w+ SKIPPED.*\((.+)\)', line)
              if m2:
                  reason = m2.group(1)
                  if reason not in skips:
                      skips.append(reason)

          report = {
              'total_skipped': len(skips),
              'skip_reasons': skips,
          }
          with open('target/python-validation/skip-report.json', 'w') as f:
              json.dump(report, f, indent=2)
          print(f'Captured {len(skips)} skip reasons')
          "

      - name: Upload skip report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skip-report
          path: target/python-validation/skip-report.json

  python-architecture-guards:
    name: Python architecture guards
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check Python capability matrix
        run: python scripts/check-python-capability-matrix.py

      - name: Check Python architecture guards
        run: python scripts/check-python-architecture-guards.py

      - name: Check Python stub parity
        run: python scripts/check_python_stub_parity.py
