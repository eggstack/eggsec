name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM
  workflow_dispatch:
    inputs:
      target:
        description: 'Target URL to scan'
        required: true
        type: string
      scan_type:
        description: 'Scan type'
        required: true
        type: choice
        options:
          - quick
          - full
          - fuzz
          - recon

env:
  EGGSEC_VERSION: 'latest'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Eggsec
        id: download
        run: |
          curl -sL -o eggsec "https://github.com/eggstack/eggsec/releases/download/${EGGSEC_VERSION}/eggsec-linux-amd64"
          if file eggsec | grep -q "ELF"; then
            chmod +x eggsec
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Binary not available for version ${EGGSEC_VERSION}. Skipping scan."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Quick Scan
        if: steps.download.outputs.available == 'true' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.scan_type == 'quick'))
        run: |
          ./eggsec scan ${{ github.event.inputs.target || 'example.com' }} --profile quick \
            --json scan-results.json \
            --sarif scan-results.sarif

      - name: Run Full Scan
        if: steps.download.outputs.available == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.scan_type == 'full'
        run: |
          ./eggsec scan ${{ github.event.inputs.target }} --profile full \
            --json scan-results.json \
            --sarif scan-results.sarif \
            --html report.html

      - name: Run Fuzzing
        if: steps.download.outputs.available == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.scan_type == 'fuzz'
        run: |
          ./eggsec fuzz ${{ github.event.inputs.target }} -t all \
            --json fuzz-results.json \
            --sarif fuzz-results.sarif

      - name: Run Reconnaissance
        if: steps.download.outputs.available == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.scan_type == 'recon'
        run: |
          ./eggsec recon ${{ github.event.inputs.target }} \
            --json recon-results.json

      - name: Upload SARIF results
        if: steps.download.outputs.available == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scan-results.sarif
          category: eggsec-scan

      - name: Upload Fuzz SARIF
        if: steps.download.outputs.available == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.scan_type == 'fuzz'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: fuzz-results.sarif
          category: eggsec-fuzz

      - name: Upload Security Report
        if: steps.download.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: |
            *.json
            *.html
            *.sarif
          retention-days: 30

      - name: Check for Critical Findings
        if: always()
        run: |
          if [ -f scan-results.json ]; then
            CRITICAL=$(jq '[.findings[] | select(.severity == "CRITICAL")] | length' scan-results.json 2>/dev/null || echo "0")
            HIGH=$(jq '[.findings[] | select(.severity == "HIGH")] | length' scan-results.json 2>/dev/null || echo "0")
            echo "Critical: $CRITICAL, High: $HIGH"
            if [ "$CRITICAL" -gt 0 ]; then
              echo "::warning::Critical vulnerabilities found!"
            fi
          fi

  scheduled-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Eggsec
        run: |
          curl -sL -o eggsec "https://github.com/eggstack/eggsec/releases/download/${EGGSEC_VERSION}/eggsec-linux-amd64"
          if ! file eggsec | grep -q "ELF"; then
            echo "::error::Binary not available for version ${EGGSEC_VERSION}. Cannot run scheduled scan."
            exit 1
          fi
          chmod +x eggsec

      - name: Load targets from file
        run: |
          if [ -f targets.txt ]; then
            echo "Targets file found"
            cat targets.txt
          else
            echo "No targets.txt found, using default"
            echo "example.com" > targets.txt
          fi

      - name: Run scans on all targets
        run: |
          while read target; do
            echo "Scanning: $target"
            ./eggsec scan "$target" --profile quick --json "scan-$target.json" || true
          done < targets.txt

      - name: Aggregate results
        run: |
          echo "# Security Scan Summary" > summary.md
          echo "" >> summary.md
          echo "Scan date: $(date)" >> summary.md
          echo "" >> summary.md
          for f in scan-*.json; do
            if [ -f "$f" ]; then
              target=$(echo "$f" | sed 's/scan-\(.*\)\.json/\1/')
              echo "## $target" >> summary.md
              jq -r '.findings[] | "- [\(.severity)] \(.type): \(.description)"' "$f" 2>/dev/null >> summary.md || echo "No findings or error" >> summary.md
              echo "" >> summary.md
            fi
          done
          cat summary.md

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-scan-results
          path: |
            scan-*.json
            summary.md
          retention-days: 90
