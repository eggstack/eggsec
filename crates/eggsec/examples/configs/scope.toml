# Eggsec Scope Configuration
# Define authorized targets for security testing
#
# IMPORTANT: Always ensure you have explicit authorization before testing any targets.
# Using this scope file helps prevent accidental testing of unauthorized systems.

# Require all targets to be explicitly in scope
require_explicit_scope = true

# Maximum requests per second (null for no limit)
max_requests_per_second = 100

# Allowed targets
[[allowed_targets]]
pattern = "*.example.com"
description = "Production web applications"

[[allowed_targets]]
pattern = "staging.example.com"
description = "Staging environment"

[[allowed_targets]]
pattern = "api.example.com"
description = "API endpoints"

[[allowed_targets]]
cidr = "10.0.0.0/8"
description = "Internal network - DMZ"

[[allowed_targets]]
cidr = "192.168.0.0/16"
description = "Internal network - Private"

# Excluded targets (always blocked even if matched by allowed rules)
[[excluded_targets]]
pattern = "admin.example.com"
description = "Admin panel - excluded by policy"

[[excluded_targets]]
pattern = "payment.example.com"
description = "Payment systems - excluded by compliance"

[[excluded_targets]]
cidr = "10.0.0.1/32"
description = "Critical database server"

[[excluded_targets]]
pattern = "*.internal.example.com"
description = "Internal-only subdomain"

# Ports to exclude from all scans
excluded_ports = [22, 3389]  # SSH, RDP

# Ports that are allowed to scan (null means all non-excluded ports)
# allowed_ports = [80, 443, 8080, 8443, 3000, 5000]
