# Eggsec Fuzzing Template
# Comprehensive fuzzing for common vulnerabilities
# Usage: eggsec fuzz --template templates/fuzz-common.yaml

name: "Common Vulnerabilities Fuzz"
description: "Test for SQLi, XSS, SSRF, and other OWASP Top 10 issues"

target:
  # Single URL or file with URLs
  url: ""

options:
  concurrency: 30
  timeout: 30000
  follow_redirects: true
  
  # Enable session handling (maintain cookies)
  session: false
  
  # Capture baseline requests for diffing
  capture_baseline: false

payloads:
  # SQL Injection testing
  sqli:
    enabled: true
    techniques:
      - error_based
      - boolean_based
      - time_based
    wordlist: "default"
    
  # Cross-Site Scripting
  xss:
    enabled: true
    techniques:
      - reflected
      - stored
      - dom_based
    encoding: ["url", "html"]
    
  # Server-Side Request Forgery  
  ssrf:
    enabled: true
    payloads:
      - "http://169.254.169.254"
      - "http://metadata.google.internal"
      - "{{interactsh-url}}"
      
  # Path Traversal
  traversal:
    enabled: true
    wordlist: "default"
    
  # Command Injection
  cmd_injection:
    enabled: false
    payloads:
      - "; whoami"
      - "| whoami"
      - "$(whoami)"
      
  # XML External Entity
  xxe:
    enabled: false
    
  # LDAP Injection
  ldap:
    enabled: false
    
  # NoSQL Injection
  nosql:
    enabled: true
    
  # Template Injection
  ssti:
    enabled: true
    
reporting:
  format: "json"
  include_poc: true
  severity_threshold: "low"
