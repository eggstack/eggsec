# Slapper Full Pipeline Template
# Comprehensive security assessment pipeline
# Usage: slapper scan --template templates/full-pipeline.yaml

name: "Full Security Assessment"
description: "Complete security scanning pipeline from recon to exploitation"

stages:
  - name: "Reconnaissance"
    type: recon
    options:
      dns_enum: true
      subdomain_enum: true
      port_scan: true
      service_version: true
      
  - name: "Port Scanning"
    type: port_scan
    options:
      ports: "1-65535"
      timing: "aggressive"
      detect_service: true
      
  - name: "Service Fingerprinting"
    type: fingerprint
    options:
      detect_versions: true
      os_detection: true
      ssl_analysis: true
      
  - name: "Endpoint Discovery"
    type: endpoints
    options:
      wordlist: "big"
      follow_redirects: true
      parse_html: true
      
  - name: "Fuzzing"
    type: fuzz
    options:
      payload_types: ["sqli", "xss", "ssrf", "traversal"]
      concurrency: 25
      
  - name: "WAF Detection"
    type: waf
    options:
      detect: true
      bypass_attempts: 5

options:
  concurrency: 30
  rate_limit: 100
  save_session: true
  session_dir: "./sessions"
  
output:
  format: "sarif"
  include_metadata: true
