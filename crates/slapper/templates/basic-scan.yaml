# Slapper Basic Scan Template
# This template runs a basic port and fingerprint scan
# Usage: slapper scan --template templates/basic-scan.yaml

name: "Basic Scan"
description: "Quick port scan with service fingerprinting"

stages:
  - type: port_scan
    options:
      ports: "1-1000"
      timing: "normal"
      concurrency: 50

  - type: fingerprint
    options:
      detect_versions: true
      os_detection: false
