syntax = "proto3";

package slapper.tool.v1;

import "google/protobuf/struct.proto";

service ToolService {
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);
  rpc GetTool(GetToolRequest) returns (GetToolResponse);
  rpc ExecuteTool(ExecuteToolRequest) returns (ExecuteToolResponse);
  rpc StreamExecuteTool(ExecuteToolRequest) returns (stream ToolStreamEvent);
  rpc GetCapabilities(CapabilitiesRequest) returns (CapabilitiesResponse);
}

message ListToolsRequest {
  string category = 1;
}

message ListToolsResponse {
  repeated ToolInfo tools = 1;
  repeated string categories = 2;
}

message GetToolRequest {
  string tool_id = 1;
}

message GetToolResponse {
  ToolInfo tool = 1;
}

message ExecuteToolRequest {
  string tool_id = 1;
  Target target = 2;
  google.protobuf.Value params = 3;
  RequestOptions options = 4;
}

message ExecuteToolResponse {
  string request_id = 1;
  string tool_id = 2;
  ResponseStatus status = 3;
  google.protobuf.Value results = 4;
  ResponseMetadata metadata = 5;
  repeated ToolError errors = 6;
  repeated Finding findings = 7;
}

message ToolStreamEvent {
  string request_id = 1;
  oneof event {
    ProgressEvent progress = 2;
    FindingEvent finding = 3;
    CompleteEvent complete = 4;
    ErrorEvent error = 5;
  }
}

message ProgressEvent {
  string message = 1;
  uint32 percent = 2;
}

message FindingEvent {
  Finding finding = 1;
}

message CompleteEvent {
  ExecuteToolResponse response = 1;
}

message ErrorEvent {
  string message = 1;
  string code = 2;
}

message CapabilitiesRequest {
  string tool_id = 1;
}

message CapabilitiesResponse {
  repeated ToolCapability capabilities = 1;
}

message ToolInfo {
  string id = 1;
  string name = 2;
  string category = 3;
  string description = 4;
  repeated string protocols = 5;
  repeated ToolCapability capabilities = 6;
}

message ToolCapability {
  string name = 1;
  string description = 2;
  repeated ParameterDef parameters = 3;
}

message ParameterDef {
  string name = 1;
  string param_type = 2;
  bool required = 3;
  google.protobuf.Value default = 4;
  string description = 5;
}

message Target {
  TargetType type = 1;
  string value = 2;
  Scope scope = 3;
}

enum TargetType {
  TARGET_TYPE_UNSPECIFIED = 0;
  TARGET_TYPE_URL = 1;
  TARGET_TYPE_DOMAIN = 2;
  TARGET_TYPE_IP = 3;
  TARGET_TYPE_CIDR = 4;
  TARGET_TYPE_FILE = 5;
}

message Scope {
  repeated string allowed_patterns = 1;
  repeated string excluded_patterns = 2;
  repeated string allowed_ips = 3;
  bool allow_subdomains = 4;
}

message RequestOptions {
  uint64 timeout_ms = 1;
  uint32 concurrency = 2;
  double rate_limit = 3;
  string proxy = 4;
  map<string, string> headers = 5;
  AuthConfig auth = 6;
  bool stealth = 7;
  bool follow_redirects = 8;
  bool verify_ssl = 9;
}

message AuthConfig {
  AuthType auth_type = 1;
  map<string, string> credentials = 2;
}

enum AuthType {
  AUTH_TYPE_UNSPECIFIED = 0;
  AUTH_TYPE_NONE = 1;
  AUTH_TYPE_BASIC = 2;
  AUTH_TYPE_BEARER = 3;
  AUTH_TYPE_API_KEY = 4;
  AUTH_TYPE_OAUTH2 = 5;
}

message ResponseMetadata {
  string started_at = 1;
  string completed_at = 2;
  uint64 duration_ms = 3;
  uint32 targets_scanned = 4;
  uint32 findings_count = 5;
}

message ResponseStatus {
  Status status = 1;
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_SUCCESS = 1;
    STATUS_PARTIAL_SUCCESS = 2;
    STATUS_FAILED = 3;
    STATUS_TIMEOUT = 4;
    STATUS_SCOPE_VIOLATION = 5;
    STATUS_CANCELLED = 6;
  }
}

message ToolError {
  string code = 1;
  string message = 2;
  google.protobuf.Value details = 3;
  string target = 4;
}

message Finding {
  string id = 1;
  string finding_type = 2;
  string severity = 3;
  string title = 4;
  string description = 5;
  string location = 6;
  string evidence = 7;
  repeated string cve_ids = 8;
  string remediation = 9;
  repeated string references = 10;
}
