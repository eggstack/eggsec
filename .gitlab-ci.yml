.slapper-base:
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
    - curl -sL "https://github.com/slapper-tool/slapper/releases/latest/download/slapper-linux-amd64" -o /usr/local/bin/slapper
    - chmod +x /usr/local/bin/slapper

slapper-quick-scan:
  extends: .slapper-base
  stage: test
  script:
    - slapper scan "$TARGET" --profile quick --json scan-results.json --sarif scan-results.sarif
  artifacts:
    when: always
    paths:
      - scan-results.json
      - scan-results.sarif
    reports:
      sarif: scan-results.sarif
  rules:
    - if: '$TARGET'

slapper-full-scan:
  extends: .slapper-base
  stage: security
  script:
    - slapper scan "$TARGET" --profile full --json scan-results.json --sarif scan-results.sarif --html report.html
  artifacts:
    when: always
    paths:
      - scan-results.json
      - scan-results.sarif
      - report.html
    reports:
      sarif: scan-results.sarif
  rules:
    - if: '$TARGET && $SCAN_TYPE == "full"'
    - if: '$CI_MERGE_REQUEST_ID'

slapper-fuzz:
  extends: .slapper-base
  stage: security
  script:
    - slapper fuzz "$TARGET" -t all --json fuzz-results.json --sarif fuzz-results.sarif
  artifacts:
    when: always
    paths:
      - fuzz-results.json
      - fuzz-results.sarif
    reports:
      sarif: fuzz-results.sarif
  rules:
    - if: '$TARGET && $SCAN_TYPE == "fuzz"'

slapper-recon:
  extends: .slapper-base
  stage: reconnaissance
  script:
    - slapper recon "$TARGET" --json recon-results.json
  artifacts:
    paths:
      - recon-results.json
  rules:
    - if: '$TARGET && $SCAN_TYPE == "recon"'

slapper-waf-test:
  extends: .slapper-base
  stage: security
  script:
    - slapper waf "$TARGET" --bypass --json waf-results.json
  artifacts:
    paths:
      - waf-results.json
  rules:
    - if: '$TARGET && $SCAN_TYPE == "waf"'

slapper-scheduled:
  extends: .slapper-base
  stage: security
  script:
    - |
      if [ -n "$TARGETS_FILE" ]; then
        while IFS= read -r target; do
          echo "Scanning $target"
          slapper scan "$target" --profile quick --json "scan-$target.json"
        done < "$TARGETS_FILE"
      fi
  artifacts:
    when: always
    paths:
      - scan-*.json
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

slapper-load-test:
  extends: .slapper-base
  stage: performance
  script:
    - slapper load "$TARGET" -n 1000 -c 50 --json load-results.json
  artifacts:
    paths:
      - load-results.json
  rules:
    - if: '$TARGET && $RUN_LOAD_TEST'
