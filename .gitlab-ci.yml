.eggsec-base:
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
    - curl -sL "https://github.com/dbowm91/eggsec/releases/latest/download/eggsec-linux-amd64" -o /usr/local/bin/eggsec
    - chmod +x /usr/local/bin/eggsec

eggsec-quick-scan:
  extends: .eggsec-base
  stage: test
  script:
    - eggsec scan "$TARGET" --profile quick --json scan-results.json --sarif scan-results.sarif
  artifacts:
    when: always
    paths:
      - scan-results.json
      - scan-results.sarif
    reports:
      sarif: scan-results.sarif
  rules:
    - if: '$TARGET'

eggsec-full-scan:
  extends: .eggsec-base
  stage: security
  script:
    - eggsec scan "$TARGET" --profile full --json scan-results.json --sarif scan-results.sarif --html report.html
  artifacts:
    when: always
    paths:
      - scan-results.json
      - scan-results.sarif
      - report.html
    reports:
      sarif: scan-results.sarif
  rules:
    - if: '$TARGET && $SCAN_TYPE == "full"'
    - if: '$CI_MERGE_REQUEST_ID'

eggsec-fuzz:
  extends: .eggsec-base
  stage: security
  script:
    - eggsec fuzz "$TARGET" -t all --json fuzz-results.json --sarif fuzz-results.sarif
  artifacts:
    when: always
    paths:
      - fuzz-results.json
      - fuzz-results.sarif
    reports:
      sarif: fuzz-results.sarif
  rules:
    - if: '$TARGET && $SCAN_TYPE == "fuzz"'

eggsec-recon:
  extends: .eggsec-base
  stage: reconnaissance
  script:
    - eggsec recon "$TARGET" --json recon-results.json
  artifacts:
    paths:
      - recon-results.json
  rules:
    - if: '$TARGET && $SCAN_TYPE == "recon"'

eggsec-waf-test:
  extends: .eggsec-base
  stage: security
  script:
    - eggsec waf "$TARGET" --bypass --json waf-results.json
  artifacts:
    paths:
      - waf-results.json
  rules:
    - if: '$TARGET && $SCAN_TYPE == "waf"'

eggsec-scheduled:
  extends: .eggsec-base
  stage: security
  script:
    - |
      if [ -n "$TARGETS_FILE" ]; then
        while IFS= read -r target; do
          echo "Scanning $target"
          eggsec scan "$target" --profile quick --json "scan-$target.json"
        done < "$TARGETS_FILE"
      fi
  artifacts:
    when: always
    paths:
      - scan-*.json
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

eggsec-load-test:
  extends: .eggsec-base
  stage: performance
  script:
    - eggsec load "$TARGET" -n 1000 -c 50 --json load-results.json
  artifacts:
    paths:
      - load-results.json
  rules:
    - if: '$TARGET && $RUN_LOAD_TEST'
