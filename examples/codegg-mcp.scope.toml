# Codegg MCP Server - Scoped Profile
# Usage: eggsec mcp-serve --stdio --profile coding-agent --scope-file scope.toml

[mcp]
profile = "coding-agent"

require_explicit_scope = true

[[allowed_targets]]
pattern = "localhost"
description = "Local development server"

[[allowed_targets]]
pattern = "127.0.0.1"
description = "Local development server"

[[allowed_targets]]
cidr = "10.0.0.0/8"
description = "Internal lab network"
