# Eggsec Example Configuration
# Copy to ~/.config/eggsec/eggsec.toml or ./eggsec.toml

[http]
# Request timeout in seconds (1-300, default: 30)
timeout_secs = 30

# Maximum retry attempts for failed requests (0-10, default: 0)
max_retries = 3

# Delay between retries in milliseconds (default: 1000)
retry_delay_ms = 1000

# Verify TLS certificates (set to false for self-signed certs)
verify_tls = true

# Follow HTTP redirects
follow_redirects = true

# Maximum redirects to follow (default: 10)
max_redirects = 10

# Default headers for all requests
[http.default_headers]
"Accept" = "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
"Accept-Language" = "en-US,en;q=0.9"
"Accept-Encoding" = "gzip, deflate"

# Custom User-Agent (leave empty for browser-like rotation)
# default_user_agent = "Eggsec/0.1.0"

# Proxy settings (for simple single-proxy setup)
# proxy = "http://127.0.0.1:8080"
# proxy_auth = "user:password"

[scan]
# Default concurrency for all scan types (default: 20)
default_concurrency = 20

# Rate limit: requests per second (null for unlimited)
rate_limit_per_second = 100

# Jitter: random delay between requests (min_ms, max_ms)
# jitter_ms = [100, 500]

# Stealth mode: randomizes timing and rotates headers
stealth_mode = false

# Ports to always exclude from scanning
exclude_ports = []

# Hosts to never scan
exclude_hosts = []

# Port scan timeout in seconds (default: 2)
port_timeout_secs = 2

# Save scan sessions for resumption
save_session = true

# Directory for session files (default: ~/.local/share/eggsec/sessions)
# session_dir = "/path/to/sessions"

[output]
# Output format: pretty, json, compact, sarif, junit, html, csv, markdown
format = "pretty"

# Verbosity: quiet, normal, verbose, debug
verbosity = "normal"

# Enable colored output
color = true

# Show progress bars
progress_bars = true

# Automatically save results
save_results = false

# Directory for saved results
# results_dir = "./scan-results"

# Include timestamps in output
include_timestamp = true

[notifications]
# Send notification when scan completes
notify_on_complete = true

# Send notification when findings are discovered
notify_on_findings = true

# Send notification on errors
notify_on_error = true

# Slack webhook URL
# slack_webhook = "https://hooks.slack.com/services/TXXXXX/BXXXXX/XXXXX"

# Discord webhook URL
# discord_webhook = "https://discord.com/api/webhooks/XXXXX/XXXXX"

# Microsoft Teams webhook URL
# teams_webhook = "https://outlook.office.com/webhook/XXXXX"

# Custom webhooks
[[notifications.webhooks]]
name = "security-monitoring"
url = "https://webhook.site/your-webhook-id"
secret = "your-signing-secret"  # Optional: adds X-Eggsec-Signature header
events = ["scan_complete", "finding"]

# Headers to include in webhook requests
[notifications.webhooks.headers]
"X-Custom-Header" = "value"

# Scan Profiles
# Custom profiles override default scan behavior. Each profile can set
# its own HTTP, scan, and fuzzing configuration.

[profiles.quick]
name = "Quick Scan"

[profiles.quick.scan]
default_concurrency = 50
port_timeout_secs = 1

[profiles.deep]
name = "Deep Scan"

[profiles.deep.scan]
default_concurrency = 30

[profiles.deep.fuzz]
payload_types = ["sqli", "xss", "traversal", "ssrf"]
concurrency = 20

[profiles.waf-focus]
name = "WAF Assessment"

[profiles.waf-focus.scan]
default_concurrency = 20

[profiles.waf-focus.fuzz]
payload_types = ["sqli", "xss", "headers"]

[profiles.full]
name = "Full Assessment"

[profiles.full.scan]
default_concurrency = 20

[profiles.full.fuzz]
payload_types = ["sqli", "xss", "traversal", "ssrf", "redos", "ssrf", "path-traversal", "command-injection"]

[profiles.api]
name = "API Security"

[profiles.api.scan]
default_concurrency = 30

[profiles.api.fuzz]
payload_types = ["sqli", "ssrf", "redos"]

# Reconnaissance settings
[recon]
dns_concurrency = 10

# API keys for external recon services
[recon.apis]
# virustotal_api_key = "your-virustotal-api-key"
# shodan_api_key = "your-shodan-api-key"
# alienvault_api_key = "your-alienvault-api-key"
# ip-api_key = "your-ip-api-key"
# maxmind_license_key = "your-maxmind-license-key"
# wayback_machine_api_key = "your-wayback-machine-api-key"
# nvd_api_key = "your-nvd-api-key"

# Scheduled scans (cron-based)
# [[schedule]]
# schedule = "0 2 * * 0"   # Weekly on Sunday at 2 AM
# target = "example.com"
# scan_type = "deep"
# output = "./reports/weekly-{{target}}-{{date}}.json"
# enabled = true

