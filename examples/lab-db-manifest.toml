# Lab DB manifest for db-pentest (Phase 1)

# This is a TOML file used with --lab-manifest.
# It is advisory in ManualPermissive (default CLI) and produces warnings if the target does not match.
# Strict profiles / CI may enforce more strictly via policy.

description = "Authorized lab Postgres, MySQL, and MSSQL instances for defense regression and hardening validation"

# Allowed hosts (exact match or simple suffix match)
allowed_hosts = [
  "127.0.0.1",
  "localhost",
  "lab-pg.internal",
  "lab-mysql.internal",
  "10.0.0.0/8",   # Phase 1 parser treats this as a literal pattern (simple contains); use exact lab IPs in practice
]

allowed_ports = [5432, 3306, 1433]

# Allowed database name patterns (substring or exact)
allowed_databases = [
  "lab",
  "test",
  "defense",
  "regression",
]

# Optional default budgets (overridable by CLI --max-queries / --max-duration)
max_queries_default = 200
max_duration_secs_default = 120
