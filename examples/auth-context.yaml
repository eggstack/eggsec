version: 1
contexts:
  user:
    description: "Normal user - set USER_TOKEN env var"
    headers:
      Authorization: "Bearer ${USER_TOKEN}"
  admin:
    description: "Admin user - set ADMIN_TOKEN env var"
    headers:
      Authorization: "Bearer ${ADMIN_TOKEN}"
  cookie-session:
    description: "Session-based auth using cookies"
    cookies:
      session_id: "${SESSION_ID}"
      csrf_token: "${CSRF_TOKEN:-default-csrf}"
    headers:
      X-Requested-With: "XMLHttpRequest"
