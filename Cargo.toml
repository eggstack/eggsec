[workspace]
members = [
    "crates/slapper",
    "crates/slapper-plugin",
    "crates/slapper-nse",
    "crates/slapper-ruby",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/slapper-tool/slapper"

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
panic = "abort"
strip = true

[profile.test]
opt-level = 1
